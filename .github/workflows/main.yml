name: Deploy CSE Club Bot to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'cse-club-bot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Download repository files onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Authenticate securely using GitHub Repository Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      # 3. Zip and upload the code to your Lambda function
      - name: Deploy Function Code
        uses: aws-actions/aws-lambda-deploy@v1
        with:
          function-name: cse-club-bot
          source-dir: ./cse-club-bot
